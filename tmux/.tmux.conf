##### Basics #####

# Start counting from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on    # Renumber windows after close
set -g focus-events on        # Let Neovim receive focus events for autoread/checktime



# Clipboard & history
set-option -g set-clipboard on
set-option -g @fastcopy-action 'tmux load-buffer -w -'
set-option -g history-limit 100000   # Scrollback size (lines)

# Mouse (selection/scroll/resize). Hold Shift to use terminal's native selection.
set -g mouse on

# Smart pane switching with awareness of Neovim splits.
# Option+h/j/k/l is received by tmux as M-h/j/k/l.
bind-key -n M-h if -F '#{@pane-is-vim}' 'send-keys M-h' 'select-pane -L'
bind-key -n M-j if -F '#{@pane-is-vim}' 'send-keys M-j' 'select-pane -D'
bind-key -n M-k if -F '#{@pane-is-vim}' 'send-keys M-k' 'select-pane -U'
bind-key -n M-l if -F '#{@pane-is-vim}' 'send-keys M-l' 'select-pane -R'
bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R

# Use vi keys in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/GithubRepos/dotfiles/tmux/copy-to-clipboard.sh"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/GithubRepos/dotfiles/tmux/copy-to-clipboard.sh"
bind-key -T copy-mode Enter send -X copy-pipe-and-cancel "$HOME/GithubRepos/dotfiles/tmux/copy-to-clipboard.sh"

# Toggle mouse quickly: <prefix> + m
bind-key m set -g mouse \; display-message "mouse: #{?mouse,on,off}"

# Reload tmux config: <prefix> + r
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Refresh client: <prefix> + R
bind-key R refresh-client

# Restart all Codex/Claude panes after account or environment changes: <prefix> + A
bind-key A run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/restart-assistant-panes.py"

# tmux-yank: make copy-mode yank always use our cross-platform clipboard helper
if-shell '[ -x "$HOME/GithubRepos/dotfiles/tmux/copy-to-clipboard.sh" ]' \
  'set -g @override_copy_command "$HOME/GithubRepos/dotfiles/tmux/copy-to-clipboard.sh"' \
  'set -gu @override_copy_command'

# Terminal: 256 colors + TrueColor
set -g default-terminal "tmux-256color"
set -g terminal-overrides ",*:RGB"


##### Plugins (TPM) #####

set -g @plugin 'tmux-plugins/tpm'

# CPU / weather / battery / focus
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# Copy enhancements
# fastcopy: <prefix> + f
set -g @plugin 'abhinav/tmux-fastcopy'
# extrakto: <prefix> + Tab to open, Tab to insert, Enter to copy
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'none'
set -g @extrakto_clip_tool "$HOME/GithubRepos/dotfiles/tmux/copy-to-clipboard.sh"
# yank: <prefix> + y
set -g @plugin 'tmux-plugins/tmux-yank'

# Session persistence
# <prefix> + Ctrl-s to save, <prefix> + Ctrl-r to restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-processes '~codex ~claude'
set -g @resurrect-hook-post-save-layout "$HOME/GithubRepos/dotfiles/tmux/assistant-resurrect-save-hook.py"

# fzf integration
set -g @plugin 'sainnhe/tmux-fzf'

# treemux (project tree via nvim)
set -g @treemux-tree 'e'
set -gu @-treemux-key-Tab
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

# Status bar theme (with prefix indicator)
set -g @plugin 'niksingh710/minimal-tmux-status'

# Jump between windows
# <prefix> + j fuzzy-jump by window name
set -g @plugin 'schasse/tmux-jump'


##### tmux-fzf config #####

# Switch windows/panes via fzf: <prefix> + g
bind-key "g" run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/fzf-goto.sh --client '#{client_name}' --session '#{session_name}' --session-group '#{session_group}' --window-id '#{window_id}' --pane-id '#{pane_id}'"

# Window display format / behavior (read by the plugin)
TMUX_FZF_WINDOW_FORMAT="[#{window_name}] #{window_index} #{b:pane_current_path} #{pane_current_command} [#{pane_width}x#{pane_height}] [history #{history_size}/#{history_limit}, #{history_bytes} bytes] #{?pane_active,[active],[inactive]}"
TMUX_FZF_OPTIONS="-p -w 90% -h 60% -m"
TMUX_FZF_PREVIEW=0

# Workspace search script: <prefix> + s
bind-key "s" run-shell -b "~/GithubRepos/dotfiles/tmux/workspace-search.sh"

##### spymux #####

# <prefix> + v preview all panes (tmux >= 3.2 uses popup)
if -F '#{>=:#{version},3.2}' \
  'bind-key "v" display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "spymux"' \
  'bind-key "v" new-window -n "spymux" "spymux"'

# <prefix> + V preview codex panes only
# Note: macOS/Linux 上 #{pane_current_command} 可能会被截断到 15 个字符（例如 codex-aarch64-a）
if -F '#{>=:#{version},3.2}' \
  'bind-key "V" display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "spymux -c codex,codex-aarch64-a,codex-x86_64-ap,codex-aarch64-u,codex-x86_64-un"' \
  'bind-key "V" new-window -n "spymux-codex" "spymux -c codex,codex-aarch64-a,codex-x86_64-ap,codex-aarch64-u,codex-x86_64-un"'


##### IPython Popup #####

# <prefix> + i quick IPython (tmux >= 3.2 uses popup)
if -F '#{>=:#{version},3.2}' \
  'bind-key "i" display-popup -E -T "IPython" -w 90% -h 80% -d "#{pane_current_path}" "ipython"' \
  'bind-key "i" new-window -n "ipython" -c "#{pane_current_path}" "ipython"'


##### Popup tools #####

# <prefix> + G lazygit popup (tmux >= 3.2 uses popup)
if -F '#{>=:#{version},3.2}' \
  'bind-key "G" if-shell "command -v lazygit >/dev/null 2>&1" "display-popup -E -T \"lazygit\" -w 90% -h 80% -d \"#{pane_current_path}\" \"env LANG=en_US.UTF-8 lazygit\"" "display-message \"lazygit is not installed\""' \
  'bind-key "G" if-shell "command -v lazygit >/dev/null 2>&1" "new-window -n \"lazygit\" -c \"#{pane_current_path}\" \"env LANG=en_US.UTF-8 lazygit\"" "display-message \"lazygit is not installed\""' 

# <prefix> + B btop popup (tmux >= 3.2 uses popup)
if -F '#{>=:#{version},3.2}' \
  'bind-key "B" if-shell "command -v btop >/dev/null 2>&1" "display-popup -E -T \"btop\" -w 90% -h 80% -d \"#{pane_current_path}\" \"btop\"" "display-message \"btop is not installed\""' \
  'bind-key "B" if-shell "command -v btop >/dev/null 2>&1" "new-window -n \"btop\" -c \"#{pane_current_path}\" \"btop\"" "display-message \"btop is not installed\""' 

# <prefix> + Space temp shell (overrides default next-layout; tmux >= 3.2 uses popup)
if -F '#{>=:#{version},3.2}' \
  'bind-key "Space" display-popup -E -T "Shell" -w 90% -h 80% -d "#{pane_current_path}"' \
  'bind-key "Space" new-window -n "shell" -c "#{pane_current_path}"'


##### treemux #####

# treemux plugin and init file are configured above; nothing else needed here


##### Everforest theme #####
# Follows macOS appearance:
#   light: GitHub Light High Contrast
#   dark:  Everforest Dark Medium
#
# Override examples:
#   TMUX_EVERFOREST_MODE=light tmux source-file ~/.tmux.conf
#   TMUX_EVERFOREST_DARK_BACKGROUND=soft tmux source-file ~/.tmux.conf

set -g status-interval 10                # Background updater refreshes Codex/Claude badges; keep tmux polling light

set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-status "bottom"

# Window rail: keep original rhythm, only hide shell icon
set -g @minimal-tmux-window-status-format " #I #{?#{||:#{==:#{@pane-window-icon},·},#{==:#{@pane-window-icon},}},,#{@pane-window-icon}}#{?window_last_flag,•,}#{@codex-badge} "

# Center prefix/tmux indicator
set -g @minimal-tmux-indicator-str ""

# Enable left status; hide the right side to avoid showing the machine hostname
set -g @minimal-tmux-right false
set -g @minimal-tmux-left true

# Fullscreen icon
set -g @minimal-tmux-expanded-icon "󰊓 "

# Keep active window compact; rounded arrows make the selected block feel taller.
set -g @minimal-tmux-use-arrow false
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""

# Current window detail: full layout signal lives here
set -g @minimal-tmux-status-right-extra ""

# Right: hidden
set -g @minimal-tmux-status-right ""

set-hook -g client-attached[92] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/apply-everforest-theme.sh >/dev/null 2>&1"'
set-hook -g client-focus-in[92] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/apply-everforest-theme.sh >/dev/null 2>&1"'

set -g status-left-length 80
set -g status-right-length 1

##### Pane borders & pane numbers #####

# Keep pane content untouched; focus is shown only by pane borders.

# Add one quiet spacer row between pane contents and the bottom window list.
set -g pane-border-status bottom
set -g pane-border-format " "

# If tmux >= 3.2, draw the active pane with a heavy border (inactive panes stay
# single-line). This makes the focused pane obvious without dimming content.
if -F '#{>=:#{version},3.2}' 'set -g pane-border-lines heavy'

# show-panes duration (ms)
set -g display-panes-time 10000


##### Auto rename windows / terminal title #####

# Auto-rename windows with a lightweight native tmux format.
# Keep shell-free: #(...) rename formats are evaluated frequently and can peg tmux CPU.
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_path},#{HOME}}, ~, #{b:pane_current_path}}'

# After manual rename, lock window name (prevent auto/OSC reset)
set-hook -g after-rename-window 'set -w automatic-rename off; set -w allow-rename off'

# Refresh cached Codex/Claude badges on structural/focus events; the daemon covers process/title changes.
set-hook -g client-attached[90] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh --force >/dev/null 2>&1"'
set-hook -g after-new-window[90] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh --force >/dev/null 2>&1"'
set-hook -g after-kill-pane[90] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh --force >/dev/null 2>&1"'
set-hook -g after-split-window[90] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh --force >/dev/null 2>&1"'
set-hook -g after-select-window[90] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh --force >/dev/null 2>&1"'
set-hook -g after-select-pane[90] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh --force >/dev/null 2>&1"'
run-shell -b 'exec env XDG_CACHE_HOME="${XDG_CACHE_HOME:-$HOME/.cache}" "$HOME/GitHubRepos/dotfiles/tmux/codex-window-badges-refresh.sh" --daemon >/dev/null 2>&1'

# Refresh cached pane layout signals and compact per-window icons.
set-hook -g client-attached[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
set-hook -g after-new-window[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
set-hook -g after-kill-pane[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
set-hook -g after-split-window[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
set-hook -g after-select-window[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
set-hook -g after-select-pane[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
set-hook -g window-layout-changed[91] 'run-shell -b "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py --force >/dev/null 2>&1"'
run-shell -b 'exec env XDG_CACHE_HOME="${XDG_CACHE_HOME:-$HOME/.cache}" "$HOME/GitHubRepos/dotfiles/tmux/pane-layout-icons-refresh.py" --daemon >/dev/null 2>&1'

# Auto-set terminal title
set -g set-titles on
set -g set-titles-string 'Tmux[#{session_name} #{window_id} #{pane_id}] #{window_index}:#{window_name} #{pane_current_path}'


##### Other behavior & key bindings #####

# History limit (already set above)
# set-option -g history-limit 100000

# Keep current directory when splitting panes
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Region zoom: <prefix> + Z expands the active pane's area to 60% while keeping
# the neighboring column visible; press again to restore the saved layout.
bind-key Z run-shell -b '
saved="$(tmux show-option -wqv @zish_saved_layout)"
if [ -n "$saved" ]; then
  tmux select-layout "$saved"
  tmux set-option -wqu @zish_saved_layout
  tmux display-message "Restored pane layout"
else
  layout="$(tmux display-message -p "#{window_layout}")"
  tmux set-option -wq @zish_saved_layout "$layout"
  tmux resize-pane -x 60% -y 100%
  tmux display-message "Pane region zoom: 60%"
fi
'

# Move between panes without prefix. When Neovim has focus, pass Alt-hjkl
# through so smart-splits can handle Neovim splits and tmux panes together.
bind-key -n M-h if -F '#{m/r:^(n?vim|view|vimdiff)$,#{pane_current_command}}' 'send-keys M-h' 'select-pane -L'
bind-key -n M-j if -F '#{m/r:^(n?vim|view|vimdiff)$,#{pane_current_command}}' 'send-keys M-j' 'select-pane -D'
bind-key -n M-k if -F '#{m/r:^(n?vim|view|vimdiff)$,#{pane_current_command}}' 'send-keys M-k' 'select-pane -U'
bind-key -n M-l if -F '#{m/r:^(n?vim|view|vimdiff)$,#{pane_current_command}}' 'send-keys M-l' 'select-pane -R'

# Fast window reordering (Vim-style): <prefix> + H/L move left/right, <prefix> + K choose target index
bind -r H swap-window -t -1
bind -r L swap-window -t +1
bind K command-prompt -p "Move current window to index" "move-window -r -t '%%'"

# New window after current (keep cwd): <prefix> + a
bind-key a new-window -a -c "#{pane_current_path}"

# tmux-jump: <prefix> + j search and jump by window name (plugin declared above)


##### Default shell (by OS) #####

if-shell "[ $(uname) = 'Linux' ]" \
    'set-option -g default-shell /usr/bin/zsh' \
    'set-option -g default-shell /bin/zsh'


##### Custom window list format (lazy load) #####

# Remove this hook if you don't need to reload window format on client attach
