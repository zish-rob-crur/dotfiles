##### TPM init #####

run '~/.tmux/plugins/tpm/tpm'

##### Post-TPM key overrides #####

# Keep <prefix> + Tab on extrakto even if treemux/default plugin bindings were loaded earlier.
unbind-key -q -T prefix Tab
bind-key Tab run-shell "~/.tmux/plugins/extrakto/scripts/open.sh \"#{pane_id}\""

# Re-apply colors after TPM plugins render their default status styles.
run-shell "$HOME/GitHubRepos/dotfiles/tmux/apply-everforest-theme.sh --force"

# Keep tmux-continuum's hidden autosave interpolation while showing no right segment.
if-shell '[ -x "$HOME/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh" ]' \
  'set -g status-right "#($HOME/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"' \
  'set -g status-right ""'
